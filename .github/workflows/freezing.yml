name: freezing
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8070 }
          - { version: 4378 }
          - { version: 3497 }
          - { version: 6028 }
          - { version: 9563 }
          - { version: 8192 }
          - { version: 3805 }
